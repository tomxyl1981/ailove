<script>
// Five Personality Dimensions
const dimensions = {
openness: {
name: '开放性',
nameEn: 'Openness',
icon: 'fa-lightbulb',
color: 'from-purple-400 to-purple-500',
desc: '创造力、好奇心、艺术兴趣',
questions: [
'我喜欢尝试新的事物和体验',
'我经常思考抽象的概念和理论',
'我对艺术和美学有浓厚的兴趣'
]
},
conscientiousness: {
name: '尽责性',
nameEn: 'Conscientiousness',
icon: 'fa-tasks',
color: 'from-blue-400 to-blue-500',
desc: '自律、组织能力、可靠性',
questions: [
'我做事总是有计划、有条理',
'我能坚持完成困难的任务',
'我注重细节，追求完美'
]
},
extraversion: {
name: '外向性',
nameEn: 'Extraversion',
icon: 'fa-sun',
color: 'from-amber-400 to-amber-500',
desc: '社交能力、活力、积极情绪',
questions: [
'我喜欢参加社交活动和聚会',
'我在人群中感到精力充沛',
'我容易与陌生人交谈'
]
},
agreeableness: {
name: '宜人性',
nameEn: 'Agreeableness',
icon: 'fa-hand-holding-heart',
color: 'from-rose-400 to-rose-500',
desc: '同理心、合作精神、信任',
questions: [
'我很容易理解和体谅他人',
'我愿意帮助有需要的人',
'我相信大多数人是善良的'
]
},
neuroticism: {
name: '情绪稳定性',
nameEn: 'Emotional Stability',
icon: 'fa-balance-scale',
color: 'from-sage-400 to-sage-500',
desc: '情绪调节、抗压能力',
questions: [
'我能够很好地管理自己的情绪',
'面对压力时我能保持冷静',
'我很少感到焦虑或担忧'
]
}
};

// State
let currentQuestion = 0;
let answers = {};
let questions = [];

// Initialize questions
function initQuestions() {
questions = [];
Object.keys(dimensions).forEach(dim => {
dimensions[dim].questions.forEach((q, idx) => {
questions.push({
dimension: dim,
question: q,
index: idx
});
});
});
}

// Start Test
function startTest() {
initQuestions();
currentQuestion = 0;
answers = {};
showPage('question-page');
renderQuestion();
}

// Show Page
function showPage(pageId) {
document.querySelectorAll('.page').forEach(page => {
page.classList.remove('page-visible');
page.classList.add('page-hidden');
});
document.getElementById(pageId).classList.remove('page-hidden');
document.getElementById(pageId).classList.add('page-visible');
}

// Render Question
function renderQuestion() {
const q = questions[currentQuestion];
const dim = dimensions[q.dimension];

// Update progress
document.getElementById('progress-text').textContent = `${currentQuestion + 1}/${questions.length}`;
document.getElementById('progress-bar').style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;

// Update dimension info
document.getElementById('dimension-name').textContent = dim.name;
document.getElementById('dimension-desc').textContent = dim.nameEn;
document.getElementById('dimension-icon').className = `w-10 h-10 rounded-xl bg-gradient-to-br ${dim.color} flex items-center justify-center shadow-md`;
document.getElementById('dimension-icon').innerHTML = `<i class="fas ${dim.icon} text-white"></i>`;

// Update question
document.getElementById('question-text').textContent = q.question;

// Render options
const optionsContainer = document.getElementById('options-container');
const options = [
{ value: 1, label: '非常不同意', desc: '完全不符合我的情况' },
{ value: 2, label: '不同意', desc: '大部分情况不符合' },
{ value: 3, label: '中立', desc: '不确定或持中立态度' },
{ value: 4, label: '同意', desc: '大部分情况符合' },
{ value: 5, label: '非常同意', desc: '完全符合我的情况' }
];

const savedAnswer = answers[`${q.dimension}_${q.index}`];

optionsContainer.innerHTML = options.map(opt => `
<div class="option-card cursor-pointer p-4 rounded-2xl border-2 transition-all ${savedAnswer === opt.value ? 'border-coral-400 bg-coral-50' : 'border-transparent bg-white/50 hover:bg-white/70 hover:border-coral-200'}"
onclick="selectAnswer(${opt.value})">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-xl ${savedAnswer === opt.value ? 'bg-gradient-to-br from-coral-400 to-rose-500' : 'bg-gray-100'} flex items-center justify-center transition-all">
<span class="font-semibold ${savedAnswer === opt.value ? 'text-white' : 'text-gray-600'}">${opt.value}</span>
</div>
<div class="flex-1">
<div class="font-medium text-gray-800">${opt.label}</div>
<div class="text-sm text-gray-500">${opt.desc}</div>
</div>
${savedAnswer === opt.value ? '<i class="fas fa-check-circle text-coral-500 text-xl"></i>' : ''}
</div>
</div>
`).join('');

// Update navigation buttons
document.getElementById('prev-btn').disabled = currentQuestion === 0;
document.getElementById('prev-btn').classList.toggle('opacity-50', currentQuestion === 0);

const isLastQuestion = currentQuestion === questions.length - 1;
document.getElementById('next-btn').innerHTML = isLastQuestion 
? '查看结果 <i class="fas fa-chart-bar ml-2"></i>' 
: '下一题 <i class="fas fa-arrow-right ml-2"></i>';
}

// Select Answer
function selectAnswer(value) {
const q = questions[currentQuestion];
answers[`${q.dimension}_${q.index}`] = value;
renderQuestion();
}

// Previous Question
function prevQuestion() {
if (currentQuestion > 0) {
currentQuestion--;
renderQuestion();
}
}

// Next Question
function nextQuestion() {
const q = questions[currentQuestion];
const answerKey = `${q.dimension}_${q.index}`;

if (!answers[answerKey]) {
showToast('请先选择一个答案');
return;
}

if (currentQuestion < questions.length - 1) {
currentQuestion++;
renderQuestion();
} else {
showResults();
}
}

// Show Results
function showResults() {
const results = {};

Object.keys(dimensions).forEach(dim => {
let total = 0;
let count = 0;
dimensions[dim].questions.forEach((q, idx) => {
const answer = answers[`${dim}_${idx}`];
if (answer) {
total += answer;
count++;
}
});
results[dim] = count > 0 ? Math.round((total / count / 5) * 100) : 50;
});

renderResults(results);
showPage('result-page');
}

// Render Results
function renderResults(results) {
const container = document.getElementById('results-container');
container.innerHTML = '';

Object.keys(results).forEach((dim, index) => {
const d = dimensions[dim];
const score = results[dim];

setTimeout(() => {
container.innerHTML += `
<div class="animate-slide-up" style="animation-delay: ${index * 0.1}s">
<div class="flex items-center justify-between mb-2">
<div class="flex items-center gap-2">
<div class="w-8 h-8 rounded-lg bg-gradient-to-br ${d.color} flex items-center justify-center">
<i class="fas ${d.icon} text-white text-sm"></i>
</div>
<span class="font-medium text-gray-700">${d.name}</span>
</div>
<span class="font-semibold text-gray-800">${score}%</span>
</div>
<div class="h-3 bg-white/50 rounded-full overflow-hidden">
<div class="result-bar h-full bg-gradient-to-r ${d.color} rounded-full" style="width: 0%"></div>
</div>
<p class="text-xs text-gray-500 mt-1">${d.desc}</p>
</div>
`;

// Animate bar
setTimeout(() => {
const bars = container.querySelectorAll('.result-bar');
if (bars[index]) {
bars[index].style.width = `${score}%`;
}
}, 100 + index * 100);
}, index * 100);
});

// Generate personality summary
setTimeout(() => {
generateSummary(results);
}, 800);
}

// Generate Summary
function generateSummary(results) {
let summary = '';
let matchSuggestion = '';

// Find highest and lowest traits
const sorted = Object.entries(results).sort((a, b) => b[1] - a[1]);
const highest = sorted[0][0];
const lowest = sorted[sorted.length - 1][0];

// Generate summary based on traits
if (results.openness > 70) {
summary += '您是一个富有创造力和好奇心的人，喜欢探索新事物。';
} else if (results.openness < 40) {
summary += '您更倾向于务实和传统，注重实际经验。';
}

if (results.conscientiousness > 70) {
summary += '做事有条理、自律性强，能够可靠地完成任务。';
} else if (results.conscientiousness < 40) {
summary += '您更加灵活随性，有时可能需要提高计划性。';
}

if (results.extraversion > 70) {
summary += '外向开朗，善于社交，在人群中充满活力。';
} else if (results.extraversion < 40) {
summary += '您更享受独处时光，内心世界丰富。';
}

if (results.agreeableness > 70) {
summary += '富有同理心，善解人意，是很好的倾听者。';
} else if (results.agreeableness < 40) {
summary += '您更加独立自主，有明确的个人立场。';
}

if (results.neuroticism > 70) {
summary += '情绪稳定，能够很好地应对压力和挑战。';
} else if (results.neuroticism < 40) {
summary += '情感丰富细腻，建议多关注情绪管理。';
}

// Match suggestion
const matchTraits = {
openness: '同样具有开放心态、喜欢探索的人',
conscientiousness: '同样注重计划和执行的人',
extraversion: '能够理解您社交需求的人',
agreeableness: '温暖体贴、善于沟通的人',
neuroticism: '情绪稳定、能给予安全感的人'
};

matchSuggestion = `根据您的人格特质，建议寻找${matchTraits[highest]}。`;
if (results.extraversion < 50) {
matchSuggestion += '外向型的伴侣可能能为您的生活带来更多活力。';
}

document.getElementById('personality-summary').textContent = summary;
document.getElementById('match-suggestion').textContent = matchSuggestion;
}

// Save and Match
function saveAndMatch() {
showToast('正在为您匹配最佳伴侣...');
setTimeout(() => {
showToast('匹配成功！即将跳转到匹配页面');
}, 2000);
}

// Restart Test
function restartTest() {
showPage('welcome-page');
}

// Show Toast
function showToast(message) {
const toast = document.getElementById('toast');
document.getElementById('toast-text').textContent = message;
toast.classList.remove('opacity-0');
toast.classList.add('opacity-100');

setTimeout(() => {
toast.classList.remove('opacity-100');
toast.classList.add('opacity-0');
}, 3000);
}
</script>
